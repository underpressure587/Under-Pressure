name: under_pressure_admin
description: "Under Pressure Admin App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_database: ^12.2.0
  google_sign_in: ^6.2.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/admin_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/admin_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
