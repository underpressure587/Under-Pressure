name: Build APK

on:
  push:
    branches:
      - app
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instalar Java (necessário para o Android build)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Instalar Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'

      # 4. Dependências
      - name: Flutter pub get
        run: flutter pub get

      # 5. Gerar ícones (se tiver o assets/icon.png)
      - name: Generate launcher icons
        run: dart run flutter_launcher_icons
        continue-on-error: true
      

      # 6. Build APK release
      - name: Build APK
        run: flutter build apk --release
      
      - name: Print SHA-1
        continue-on-error: true
        run: keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep SHA1

      # 7. Upload do APK como artefato
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: under-pressure-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # 8. Criar Release automático se for tag
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: Under Pressure ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
