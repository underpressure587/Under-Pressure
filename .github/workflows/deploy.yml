# ═══════════════════════════════════════════════════════════════
#  Under Pressure — Deploy Automático
# ═══════════════════════════════════════════════════════════════

name: Build e Deploy — Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gerar bundle.js
        run: node build.js

      - name: Cache busting no index.html
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "Versão: $VERSION"
          sed -i "s/\?v=[A-Za-z0-9_-]*/\?v=$VERSION/g" index.html

      - name: Gerar version.json
        run: |
          HASH=$(git rev-parse HEAD)
          SHORT=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_MSG=$(git log -1 --pretty=%s | sed "s/\"/'/g")
          CHANGED=$(git diff-tree --no-commit-id -r --name-only HEAD | grep -v "bundle\.js\|version\.json\|bundle\.backup\.js" | head -20 | paste -sd ',' -)
          FILES_JSON=$(echo "$CHANGED" | tr ',' '\n' | grep -v '^$' | sed 's/.*/\"&\"/' | paste -sd ',' - | sed 's/^/[/' | sed 's/$/]/')
          if [ -z "$FILES_JSON" ] || [ "$FILES_JSON" = "[]" ]; then FILES_JSON="[]"; fi
          echo "{\"hash\":\"$HASH\",\"versao\":\"v$SHORT\",\"deployedAt\":\"$TIMESTAMP\",\"commitMsg\":\"$COMMIT_MSG\",\"arquivosAlterados\":$FILES_JSON}" > version.json
          echo "version.json gerado: v$SHORT"
          cat version.json

      - name: Deploy no Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
