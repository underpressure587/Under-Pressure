name: Gerar Keystore

on:
  workflow_dispatch:

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Gerar keystore e mostrar base64
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass underpressure123 \
            -keypass underpressure123 \
            -dname "CN=Under Pressure,O=Android,C=BR"
          echo "==== KEYSTORE BASE64 (copie tudo abaixo) ===="
          base64 -w 0 keystore.jks
          echo ""
          echo "==== SHA1 ===="
          keytool -list -v -keystore keystore.jks -alias upload -storepass underpressure123 | grep SHA1
